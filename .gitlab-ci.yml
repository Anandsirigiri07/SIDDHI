stages:
  - test
  - build

backend:tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    - pytest -v
  rules:
    - changes:
        - backend/**/*

frontend:lint:
  stage: test
  image: node:22-slim
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
  rules:
    - changes:
        - frontend/**/*

frontend:build:
  stage: build
  image: node:22-slim
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  rules:
    - changes:
        - frontend/**/*
